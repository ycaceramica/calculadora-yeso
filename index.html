<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calculadora de Yeso</title>

<style>

:root{
--bg:#f5efe6;
--card:#fffaf3;
--text:#4b3a2f;
--accent:#c97b4f;
--accent-hover:#b46a42;
--result:#f0e3d6;
}

body.dark{
--bg:#2c2420;
--card:#3a302b;
--text:#f3e9e2;
--accent:#d38c5f;
--accent-hover:#c57c50;
--result:#4a3e38;
}

body{
font-family:Arial;
background:var(--bg);
color:var(--text);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:var(--card);
padding:30px;
border-radius:14px;
box-shadow:0 6px 25px rgba(0,0,0,0.15);
width:340px;
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
font-size:14px;
}

input,select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:14px;
border-radius:6px;
border:1px solid #d8cfc4;
box-sizing:border-box;
font-size:14px;
}

button{
width:100%;
padding:11px;
background:var(--accent);
color:white;
border:none;
border-radius:6px;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:var(--accent-hover);
}

.row{
display:flex;
gap:10px;
margin-top:10px;
}

.smallbtn{
font-size:13px;
padding:9px;
}

.resultado{
margin-top:18px;
background:var(--result);
padding:12px;
border-radius:7px;
font-size:15px;
}

</style>
</head>

<body>

<div class="card">

<h2>Calculadora de Yeso</h2>

<label>Tipo de molde</label>

<select id="tipoMolde" onchange="cambiarTipo();calcular();">
<option value="rectangular">Rectangular</option>
<option value="circular">Circular</option>
</select>

<div id="rectangular">

<label>Largo (cm)</label>
<input type="number" id="largo" oninput="calcular()">

<label>Ancho (cm)</label>
<input type="number" id="ancho" oninput="calcular()">

<label>Profundidad (cm)</label>
<input type="number" id="profundidad" oninput="calcular()">

</div>

<div id="circular" style="display:none">

<label>Radio de la pieza (cm)</label>
<input type="number" id="radioPieza" oninput="calcular()">

<label>Radio del molde (cm)</label>
<input type="number" id="radioMolde" oninput="calcular()">

<label>Altura de la pieza (cm)</label>
<input type="number" id="alturaPieza" oninput="calcular()">

<label>Altura del molde (cm)</label>
<input type="number" id="alturaMolde" oninput="calcular()">

</div>

<div class="resultado">

Agua necesaria: <b><span id="agua">0</span> ml (cm³)</b><br><br>
Yeso necesario: <b><span id="yeso">0</span> g</b>

</div>

<div class="row">

<button class="smallbtn" onclick="copiar()">Copiar resultado</button>

<button class="smallbtn" onclick="limpiar()">Limpiar</button>

</div>

<div class="row">

<button class="smallbtn" onclick="modoOscuro()">Modo oscuro</button>

</div>

</div>

<script>

function cambiarTipo(){

var tipo=document.getElementById("tipoMolde").value;

if(tipo=="rectangular"){
document.getElementById("rectangular").style.display="block";
document.getElementById("circular").style.display="none";
}else{
document.getElementById("rectangular").style.display="none";
document.getElementById("circular").style.display="block";
}

}

function calcular(){

var tipo=document.getElementById("tipoMolde").value;

var volumen=0;

if(tipo=="rectangular"){

var largo=document.getElementById("largo").value||0;
var ancho=document.getElementById("ancho").value||0;
var profundidad=document.getElementById("profundidad").value||0;

volumen=(largo*ancho*profundidad)/1.3;

}else{

var rp=document.getElementById("radioPieza").value||0;
var rm=document.getElementById("radioMolde").value||0;
var ap=document.getElementById("alturaPieza").value||0;
var am=document.getElementById("alturaMolde").value||0;

var volumenMolde=Math.PI*rm*rm*am;
var volumenPieza=Math.PI*rp*rp*ap;

volumen=(volumenMolde-volumenPieza)/1.3;

}

var agua=volumen;
var yeso=(agua*100)/75;

document.getElementById("agua").innerText=agua.toFixed(2);
document.getElementById("yeso").innerText=yeso.toFixed(2);

}

function copiar(){

var texto="Agua: "+document.getElementById("agua").innerText+
" ml | Yeso: "+document.getElementById("yeso").innerText+" g";

navigator.clipboard.writeText(texto);

alert("Resultado copiado");

}

function limpiar(){

document.querySelectorAll("input").forEach(i=>i.value="");

document.getElementById("agua").innerText=0;
document.getElementById("yeso").innerText=0;

}

function modoOscuro(){

document.body.classList.toggle("dark");

}

</script>

</body>
</html>
